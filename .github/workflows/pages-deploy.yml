# Workflow to run examples, build Jekyll site, and deploy
name: pages-run-build-deploy

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # C++ job
  cpp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install C++ compiler
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Find and compile C++ projects
        run: bash .github/scripts/run_all_cpp.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cpp-artifacts
          retention-days: 1
          path: cpp/

  # Python job
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python packages
        run: pip install numpy matplotlib

      - name: Find and run Python projects
        run: bash .github/scripts/run_all_python.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-artifacts
          retention-days: 1
          path: python/

  # MATLAB job
  matlab:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          release: R2025a
      - name: Run MATLAB Sandbox Script
        uses: matlab-actions/run-command@v3
        with:
          command: >
            addpath('.github/scripts');
            run_all_scripts('matlab');
      - name: Move Published Artifacts
        run: |
          mkdir -p published
          mv matlab/html/* published
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
            name: matlab-artifacts
            retention-days: 1
            path: matlab/
      - name: Upload figures
        uses: actions/upload-artifact@v7
        with:
            name: matlab-figures
            retention-days: 1
            path: figures/
      - name: Upload published documents
        uses: actions/upload-artifact@v7
        with:
            name: matlab-published
            retention-days: 1
            path: published/
        
      - name: Display structure of repo files (3)
        run: ls -R

  # Build job
  build:
    runs-on: ubuntu-latest
    needs: [cpp, matlab, python]
    env:
      CPP_DIR: docs/_includes/cpp
      FIGS_DIR: docs/assets/images/figures
      PUBS_DIR: docs/assets/published
      MATLAB_DIR: docs/_includes/matlab
      PYTHON_DIR: docs/_includes/python
      ZIP_FILE: docs/assets/code_examples.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Create source zip file
        run: |
          mkdir -p "$(dirname ${{ env.ZIP_FILE }})"
          zip -r ${{ env.ZIP_FILE }} cpp matlab python
      - name: Create artifacts directories
        run: |
          mkdir -p ${{ env.CPP_DIR }}
          mkdir -p ${{ env.MATLAB_DIR }}
          mkdir -p ${{ env.PYTHON_DIR }}
          mkdir -p ${{ env.FIGS_DIR }}
      - name: Download C++ Artifacts
        uses: actions/download-artifact@v8
        with:
          name: cpp-artifacts
          path: ${{ env.CPP_DIR }}
      - name: Download Python Artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-artifacts
          path: ${{ env.PYTHON_DIR }}
      - name: Download Figure Artifacts
        uses: actions/download-artifact@v8
        with:
          name: matlab-figures
          path: ${{ env.FIGS_DIR }}
      - name: Download Published Artifacts
        uses: actions/download-artifact@v8
        with:
          name: matlab-published
          path: ${{ env.PUBS_DIR }}
      - name: Download MATLAB artifacts
        uses: actions/download-artifact@v8
        with:
          name: matlab-artifacts
          path: ${{ env.MATLAB_DIR }}

      - name: Setup Pages
        uses: actions/configure-pages@v6
        
      - name: Display structure of downloaded files (4)
        run: ls -R
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
